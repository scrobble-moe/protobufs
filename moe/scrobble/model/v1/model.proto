syntax = "proto3";

package moe.scrobble.model.v1;

//User

enum Role {
  USER = 0;
  ADMIN = 1;
}

message GetUserRequest {
  optional string id = 1;
  optional string email = 2;
  optional int32 plex_id = 3;
}

message GetUserResponse {
  string id = 1;
  string username = 4;
  string email = 5;
  int32 plex_id = 6;
  string thumb = 8;
  Role role = 12;
  repeated Authenticator authenticators = 13;
  repeated Token tokens = 15;
}

message Server {
  string id = 1;
  string uuid = 2;
  string secret = 3;
}

message GetUsersRequest {}

message GetUsersResponse {
  repeated GetUserResponse users = 1;
}

//Server

message GetServerRequest {
  string id = 1;
}

message GetServerResponse {
  Server server = 1;
}

message GetServersRequest {}

message GetServersResponse {
  repeated Server servers = 1;
}

message AddServerRequest {
  string uuid = 1;
  string name = 3;
}

message AddServerResponse {
  Server server = 1;
}

//Authenticator

enum Transport {
  USB = 0;
  BLE = 1;
  NFC = 2;
  INTERNAL = 3;
}

message Authenticator {
  string id = 1;
  string friendly_name = 2;
  string aaguid = 3;
  bytes credential_id = 4;
  bytes credential_public_key = 5;
  int32 counter = 6;
  bool revoked = 7;
  repeated Transport transports = 8;
}

message GetAuthenticatorRequest {
  string id = 1;
}

message GetAuthenticatorResponse {
  Authenticator authenticator = 1;
}

message GetAuthenticatorsRequest {}

message GetAuthenticatorsResponse {
  repeated Authenticator authenticators = 1;
}

message GetAuthenticatorRegistrationOptionsRequest {}

message GetAuthenticatorRegistrationOptionsResponse {
  string options = 1;
}

message AddAuthenticatorRequest {
  string name = 1;
  string verification = 2;
}

message AddAuthenticatorResponse {}

message RevokeAuthenticatorRequest {
  string id = 1;
}

message RevokeAuthenticatorResponse {}

//Token

enum TokenType {
  ACCESS = 0;
  REFRESH = 1;
}

message Token {
  string id = 1;
  uint32 created_at = 2;
  uint32 updated_at = 3;
  string hashed_token = 4;
  uint32 expires_at = 5;
  TokenType type = 6;
}

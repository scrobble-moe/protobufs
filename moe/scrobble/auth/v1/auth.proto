syntax = "proto3";

package moe.scrobble.auth.v1;

message PlexAuthRequest {
  string plex_token = 1;
}

message PlexAuthResponse {
  string username = 1;
  string avatar_url = 2;
  oneof webauthn_options {
    string create = 3;
    string request = 4;
  }
}

message WebAuthnRequest {
  string plex_token = 1;
  string verification = 2;
}

message WebAuthnResponse {}
